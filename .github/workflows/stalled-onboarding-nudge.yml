# Stalled-onboarding nudge (doctor-journey fix wave, 2026-07)
#
# Doctors who start onboarding but never finish get exactly ONE gentle
# bilingual reminder (2-14 days after their last 'started' event). The
# endpoint is DARK until STALLED_NUDGE_ENABLED=true is set in Netlify env —
# until then it answers { status: "disabled" } and this cron stays green.
#
# Requires the INTERNAL_API_SHARED_SECRET repo secret (same value as the
# Netlify env var of the same name). If the secret is not configured the run
# skips with a notice instead of failing.
#
# Watch ownership: COO desk (kah-operations Paperclip tracker).

name: Stalled-onboarding nudge

on:
  schedule:
    - cron: '0 16 * * *' # daily 16:00 UTC (10:00 CDMX — polite send time)
  workflow_dispatch:

jobs:
  nudge:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger nudge endpoint
        env:
          INTERNAL_SECRET: ${{ secrets.INTERNAL_API_SHARED_SECRET }}
        run: |
          if [ -z "$INTERNAL_SECRET" ]; then
            echo '::notice::INTERNAL_API_SHARED_SECRET repo secret not set — skipping (nudge stays dark).'
            exit 0
          fi
          code=$(curl -s -o /tmp/body -w '%{http_code}' --max-time 60 \
            -X POST \
            -H "X-Internal-Secret: $INTERNAL_SECRET" \
            'https://medikah.health/api/internal/stalled-onboarding-nudge')
          echo "HTTP $code"
          cat /tmp/body
          if [ "$code" != "200" ]; then
            echo 'Nudge endpoint returned an error.'
            exit 1
          fi
